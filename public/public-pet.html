<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira de Saúde Digital - MedSaaS</title>
  <!-- Google Fonts: Outfit e Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    :root {
      --brand-primary: #0d9488;
      --brand-background: #f8fafc;
      --color-white: #ffffff;
      --color-gray-100: #f1f5f9;
      --color-gray-200: #e2e8f0;
      --color-gray-500: #64748b;
      --color-gray-800: #1e293b;
      --color-gray-900: #0f172a;
      
      --color-success: #10b981;
      --color-success-light: rgba(16, 185, 129, 0.1);
      --color-danger: #ef4444;
      --color-danger-light: rgba(239, 68, 68, 0.1);
      
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-full: 9999px;
      --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--brand-background);
      color: var(--color-gray-800);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background-color: var(--color-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--color-gray-200);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header-card {
      background: linear-gradient(135deg, var(--brand-primary) 0%, #0f766e 100%);
      color: var(--color-white);
      padding: 30px 20px;
      text-align: center;
      position: relative;
    }

    .pet-avatar {
      width: 90px;
      height: 90px;
      border-radius: var(--radius-full);
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.4);
      margin: 0 auto 12px;
      display: block;
    }

    .pet-name {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .pet-badge {
      display: inline-block;
      background-color: rgba(255, 255, 255, 0.15);
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 500;
    }

    .content-body {
      padding: 24px;
    }

    .section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--color-gray-900);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .vaccines-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .vaccine-item {
      border: 1px solid var(--color-gray-200);
      padding: 16px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: var(--color-white);
    }

    .vac-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .vac-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-gray-900);
    }

    .vac-date {
      font-size: 11px;
      color: var(--color-gray-500);
    }

    .status-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: var(--radius-full);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-active {
      background-color: var(--color-success-light);
      color: var(--color-success);
    }

    .status-expired {
      background-color: var(--color-danger-light);
      color: var(--color-danger);
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--color-gray-500);
      border-top: 1px solid var(--color-gray-100);
      background-color: var(--color-white);
    }

    .spinner {
      border: 4px solid var(--color-gray-200);
      border-top: 4px solid var(--brand-primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-container {
      text-align: center;
      padding: 40px 20px;
    }

    .error-container i {
      width: 48px;
      height: 48px;
      color: var(--color-danger);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="loader">
      <div class="spinner"></div>
      <p style="text-align: center; color: var(--color-gray-500); font-size: 14px; margin-bottom: 40px;">Carregando dados da carteirinha...</p>
    </div>

    <div id="error-screen" class="error-container" style="display: none;">
      <i data-lucide="alert-octagon"></i>
      <h3 style="font-size: 18px; margin-bottom: 8px;">Carteirinha não encontrada</h3>
      <p style="color: var(--color-gray-500); font-size: 14px;">Os dados deste pet podem ter sido arquivados ou o QR Code é inválido.</p>
    </div>

    <!-- Interface Renderizada Dinamicamente -->
    <div id="card-screen" style="display: none;">
      <div class="header-card">
        <img id="pet-img" src="" alt="Avatar do Pet" class="pet-avatar">
        <h2 id="pet-name" class="pet-name">Rex</h2>
        <span id="pet-info-badge" class="pet-badge">Cão • Labrador</span>
      </div>

      <div class="content-body">
        <h3 class="section-title"><i data-lucide="shield-check" style="color: var(--brand-primary);"></i> Histórico de Vacinação</h3>
        <div id="vaccines-container" class="vaccines-list">
          <!-- Vacinas -->
        </div>
      </div>

      <footer class="footer">
        <p>Autenticado e assinado digitalmente por <strong>MedSaaS</strong></p>
        <p style="margin-top: 4px; font-size: 10px;">Gestão de Clínicas Médicas</p>
      </footer>
    </div>
  </div>

  <!-- Firebase Client SDK (carregando apenas o Firestore básico necessário) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Configuração real do Firebase. Usa o mesmo banco de dados multitenant.
    const firebaseConfig = {
      apiKey: "AIzaSyCkQRjFS9hZdEtQ2h30Pp6KNEjgsANLBqg",
      authDomain: "medsaas-182392.firebaseapp.com",
      projectId: "medsaas-182392",
      storageBucket: "medsaas-182392.firebasestorage.app",
      messagingSenderId: "810343104762",
      appId: "1:810343104762:web:8048f5764dbbbcfd5e0943"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. Extrair clinicId e petId da URL
    const urlParams = new URLSearchParams(window.location.search);
    const clinicId = urlParams.get("clinicId");
    const petId = urlParams.get("petId");

    const loader = document.getElementById("loader");
    const errorScreen = document.getElementById("error-screen");
    const cardScreen = document.getElementById("card-screen");

    async function loadPublicVaccineCard() {
      if (!clinicId || !petId) {
        showError();
        return;
      }

      try {
        // Buscar documento na subcoleção pública autorizada pelas security rules do Firestore
        const docRef = doc(db, "clinics", clinicId, "pets", petId, "publicProfile", "vaccines");
        const snap = await getDoc(docRef);

        if (snap.exists()) {
          const data = snap.data();
          renderCard(data);
        } else {
          showError();
        }
      } catch (err) {
        console.error(err);
        showError();
      }
    }

    function showError() {
      loader.style.display = "none";
      errorScreen.style.display = "block";
      lucide.createIcons();
    }

    function renderCard(data) {
      document.getElementById("pet-name").textContent = data.petName || "Sem Nome";
      document.getElementById("pet-info-badge").textContent = `${data.species || 'Animal'} • ${data.breed || 'SRD'}`;
      
      const img = document.getElementById("pet-img");
      img.src = data.photoUrl || "https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&q=80&w=200";

      const vacContainer = document.getElementById("vaccines-container");
      vacContainer.innerHTML = "";

      if (!data.vaccines || data.vaccines.length === 0) {
        vacContainer.innerHTML = `
          <div style="text-align: center; padding: 20px; color: var(--color-gray-500); font-size: 13px;">
            Nenhuma vacina registrada na carteira digital.
          </div>
        `;
      } else {
        const now = new Date();
        data.vaccines.forEach(vac => {
          const expDate = new Date(vac.dateExpiration);
          const isExpired = expDate < now;
          
          const item = document.createElement("div");
          item.className = "vaccine-item";
          item.innerHTML = `
            <div class="vac-info">
              <span class="vac-title">${vac.name}</span>
              <span class="vac-date">Aplicada: ${formatDate(vac.dateAdministered)}</span>
              <span class="vac-date">Vencimento: ${formatDate(vac.dateExpiration)}</span>
            </div>
            <div>
              <span class="status-badge ${isExpired ? 'status-expired' : 'status-active'}">
                ${isExpired ? 'Vencida' : 'Válida'}
              </span>
            </div>
          `;
          vacContainer.appendChild(item);
        });
      }

      loader.style.display = "none";
      cardScreen.style.display = "block";
      lucide.createIcons();
    }

    function formatDate(dateStr) {
      if (!dateStr) return "N/A";
      const d = new Date(dateStr);
      return d.toLocaleDateString("pt-BR");
    }

    // Inicialização
    loadPublicVaccineCard();
  </script>
</body>
</html>
